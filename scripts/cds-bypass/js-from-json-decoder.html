<!DOCTYPE html>
<html>
<head>
<title>JSON → JS Decoder (CDS Bypass)</title>
<style>
body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #1a1a2e; color: #e0e0e0; }
h1 { color: #7ec8e3; }
textarea { width: 100%; height: 200px; font-family: monospace; font-size: 13px; background: #16213e; color: #e0e0e0; border: 1px solid #0f3460; padding: 10px; box-sizing: border-box; }
button { background: #0f3460; color: #e0e0e0; border: none; padding: 10px 20px; cursor: pointer; margin: 5px 0; font-size: 14px; }
button:hover { background: #7ec8e3; color: #000; }
.info { color: #888; font-size: 13px; margin: 5px 0; }
</style>
</head>
<body>
<h1>JSON → JS Decoder</h1>
<p class="info">Decodes a WDK transport payload (.json) back to the original .js file.<br>
For split payloads, load all chunks — they'll be reassembled automatically.</p>

<h3>1. Load JSON payload(s):</h3>
<input type="file" id="filePicker" accept=".json" multiple>
<p class="info" id="chunkStatus"></p>

<h3>2. Decode and download:</h3>
<button onclick="decode()">Decode to JS</button>
<p class="info" id="status"></p>

<textarea id="jsOutput" placeholder="Decoded JavaScript appears here..." readonly></textarea>

<script>
var loadedChunks = {};
var totalChunks = 1;

document.getElementById('filePicker').addEventListener('change', function(e) {
  loadedChunks = {};
  totalChunks = 1;
  var files = e.target.files;
  var loaded = 0;
  for (var i = 0; i < files.length; i++) {
    (function(file) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        try {
          var payload = JSON.parse(ev.target.result);
          if (payload.total_chunks) {
            totalChunks = payload.total_chunks;
            loadedChunks[payload.chunk] = payload.data;
          } else if (payload.data && Array.isArray(payload.data)) {
            loadedChunks[1] = payload.data[0];
            totalChunks = 1;
          } else {
            alert('Unrecognized payload format in ' + file.name);
          }
        } catch (err) {
          alert('Failed to parse ' + file.name + ': ' + err.message);
        }
        loaded++;
        document.getElementById('chunkStatus').textContent =
          'Loaded ' + loaded + '/' + files.length + ' file(s). ' +
          Object.keys(loadedChunks).length + '/' + totalChunks + ' chunks ready.';
      };
      reader.readAsText(file);
    })(files[i]);
  }
});

function decode() {
  if (Object.keys(loadedChunks).length === 0) { alert('No payload loaded'); return; }
  if (Object.keys(loadedChunks).length < totalChunks) {
    alert('Missing chunks: have ' + Object.keys(loadedChunks).length + '/' + totalChunks);
    return;
  }
  var assembled = '';
  for (var i = 1; i <= totalChunks; i++) {
    assembled += loadedChunks[i];
  }
  var js = decodeURIComponent(escape(atob(assembled)));
  document.getElementById('jsOutput').value = js;
  document.getElementById('status').textContent = 'Decoded: ' + js.length + ' chars';
  var a = document.createElement('a');
  a.href = 'data:text/javascript;charset=utf-8,' + encodeURIComponent(js);
  a.download = 'wdk.js';
  a.click();
}
</script>
</body>
</html>
